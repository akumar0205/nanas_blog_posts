<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A collection of poems and writings by my grandfather, sharing his life experiences, thoughts on meditation, and reflections on relationships.">
    <meta property="og:title" content="मेरे अनुभव मेरी कविताये - My Experiences, My Poems">
    <meta property="og:description" content="A collection of poems and writings by my grandfather, sharing his life experiences, thoughts on meditation, and reflections on relationships.">
    <meta property="og:image" content="nana_image.jpg">
    <meta property="og:type" content="website">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✍️</text></svg>">
    <title>मेरे अनुभव मेरी कविताये - My Experiences, My Poems</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Left Sidebar with Image -->
        <aside class="sidebar">
            <div class="sidebar-content">
                <div class="image-container">
                    <img src="nana_image.jpg" alt="Nana" class="nana-image">
                </div>
                <div class="sidebar-info">
                    <h1 class="site-title">मेरे अनुभव<br>मेरी कविताये</h1>
                    <p class="site-subtitle">My Experiences, My Poems</p>
                    <p class="site-description">
                        A collection of poems and writings by my grandfather, 
                        sharing his life experiences, thoughts on meditation, 
                        and reflections on relationships.
                    </p>
                    <div class="post-count">
                        <span id="total-posts">0</span> posts
                    </div>
                </div>
            </div>
        </aside>

        <!-- Right Content Area with Posts -->
        <main class="main-content">
            <div class="posts-container" id="posts-container">
                <!-- Posts will be loaded here -->
            </div>
            
            <!-- Loading indicator -->
            <div class="loading" id="loading">
                <div class="loading-spinner"></div>
                <p>Loading more posts...</p>
            </div>
            
            <!-- End of posts message -->
            <div class="end-message" id="end-message" style="display: none;">
                <p>— End of posts —</p>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
